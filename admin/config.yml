# Decap CMS 配置
# 后台地址：/admin/
# backend.base_url 指向你部署的 Cloudflare Worker（OAuth 中转）

backend:
  name: github
  repo: renguifeng/renguifeng.github.io
  branch: master
  base_url: https://YOUR-WORKER.workers.dev   # ← 部署 Worker 后，把这个 URL 告诉 Claude，由它替换
  auth_endpoint: /auth/github

# 上传的图片存在这个目录
media_folder: "images/uploads"
public_folder: "/images/uploads"

# 站点信息（显示在 CMS 右上角）
publish_mode: editorial_workflow   # 可选：开启草稿/审稿工作流；不需要可删掉这行

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"   # 自动生成 _posts 要求的 YYYY-MM-DD-标题 文件名
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "标题",     name: "title",   widget: "string" }
      - { label: "发布日期", name: "date",    widget: "datetime" }
      - { label: "标签",     name: "tags",    widget: "list", required: false, default: [] }
      - { label: "摘要",     name: "excerpt", widget: "text",  required: false }
      - { label: "正文",     name: "body",    widget: "markdown" }
