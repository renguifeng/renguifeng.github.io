<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="base" content="{{ site.baseurl }}/">

  <title>
    {%- if page.title -%}{{ page.title | escape }} · {{ site.title | escape }}{%- else -%}{{ site.title | escape }}{%- endif -%}
  </title>

  {% seo title=false %}
  {% feed_meta %}

  <link rel="stylesheet" href="{{ '/stylesheets/stylesheet.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/stylesheets/syntax.css' | relative_url }}">

  <script src="{{ '/javascripts/script.js' | relative_url }}" defer></script>
</head>
<body>
  {% include nav.html %}

  {{ content }}

  {% include footer.html %}
</body>
</html>
